<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>MemCase | Cyberpunk Meme Collector</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #050505;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        /* Киберпанк сетка */
        .cyber-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 133, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 133, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* Скан-линия */
        .scan-line {
            position: fixed;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(0, 255, 133, 0.1), transparent);
            animation: scan 10s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        /* Шум */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.04"/></svg>');
            pointer-events: none;
            z-index: 2;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 500px;
            margin: 0 auto;
            padding-bottom: 75px;
        }

        /* Хедер с неоном */
        .header {
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(20px);
            padding: 18px 20px;
            border-bottom: 1px solid rgba(0, 255, 133, 0.3);
            position: sticky;
            top: 0;
            z-index: 20;
        }

        .logo {
            font-size: 26px;
            font-weight: 900;
            background: linear-gradient(135deg, #00FF85, #FF00FF, #00F0FF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(0,255,133,0.5);
            letter-spacing: 2px;
        }

        .balance-row {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .balance-item {
            background: rgba(0, 255, 133, 0.1);
            border: 1px solid rgba(0, 255, 133, 0.4);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            backdrop-filter: blur(5px);
        }

        .balance-item.coins { border-color: #00FF85; color: #00FF85; box-shadow: 0 0 8px rgba(0,255,133,0.3); }
        .balance-item.crystals { border-color: #FF00FF; color: #FF00FF; box-shadow: 0 0 8px rgba(255,0,255,0.3); }
        .balance-item.stars { border-color: #00F0FF; color: #00F0FF; box-shadow: 0 0 8px rgba(0,240,255,0.3); }

        /* Навигация */
        .nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0, 255, 133, 0.3);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 14px;
            z-index: 30;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #555;
            font-size: 22px;
            cursor: pointer;
            text-align: center;
            padding: 6px 14px;
            border-radius: 30px;
            transition: all 0.2s;
        }

        .nav-btn.active {
            color: #00FF85;
            background: rgba(0, 255, 133, 0.15);
            text-shadow: 0 0 8px #00FF85;
        }

        .nav-label {
            font-size: 10px;
            display: block;
            margin-top: 4px;
        }

        /* Вкладки */
        .tab-content {
            display: none;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Карточки кейсов */
        .cases-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .case-card {
            background: rgba(15, 15, 25, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 18px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(0, 255, 133, 0.2);
            position: relative;
            overflow: hidden;
        }

        .case-card:active { transform: scale(0.96); }

        .case-card.common { border-top: 3px solid #00FF85; box-shadow: 0 -2px 10px rgba(0,255,133,0.2); }
        .case-card.rare { border-top: 3px solid #FF00FF; box-shadow: 0 -2px 10px rgba(255,0,255,0.2); }
        .case-card.epic { border-top: 3px solid #FFD700; box-shadow: 0 -2px 10px rgba(255,215,0,0.2); }
        .case-card.friend { border-top: 3px solid #FF6B6B; box-shadow: 0 -2px 10px rgba(255,107,107,0.2); }

        .case-icon { font-size: 42px; margin-bottom: 8px; }
        .case-title { font-size: 14px; font-weight: bold; margin-bottom: 4px; }
        .case-price { font-size: 10px; color: #00FF85; }
        .case-cooldown { font-size: 9px; color: #666; margin-top: 6px; }

        /* Анимации открытия */
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-7px); }
            75% { transform: translateX(7px); }
        }

        @keyframes flash {
            0%,100% { filter: brightness(1); }
            50% { filter: brightness(1.5); background: rgba(0,255,133,0.2); }
        }

        .shake { animation: shake 0.3s ease; }
        .flash { animation: flash 0.2s ease; }

        /* Модальное окно открытия */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.97);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: rgba(15, 15, 25, 0.95);
            border: 2px solid #00FF85;
            border-radius: 40px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,255,133,0.3);
        }

        .loading-bar {
            width: 200px;
            height: 3px;
            background: #333;
            border-radius: 3px;
            margin-top: 24px;
            overflow: hidden;
        }

        .loading-progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00FF85, #FF00FF);
            transition: width 1s ease;
        }

        /* ПОЛНОЭКРАННЫЙ РЕЗУЛЬТАТ */
        .fullscreen-result {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #050505, #0A0A0F);
            backdrop-filter: blur(20px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeInScale 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
            padding: 20px;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .result-card {
            background: linear-gradient(135deg, rgba(15,15,25,0.98), rgba(5,5,5,0.98));
            border-radius: 48px;
            padding: 32px 24px;
            text-align: center;
            max-width: 340px;
            width: 100%;
            border: 2px solid;
            box-shadow: 0 0 60px rgba(0,255,133,0.3);
            animation: floatIn 0.5s ease;
        }

        @keyframes floatIn {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-image {
            width: 200px;
            height: 200px;
            border-radius: 32px;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 0 30px currentColor;
        }

        .result-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .result-rarity {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 16px;
        }

        .result-price {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 24px;
        }

        .result-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .result-btn {
            flex: 1;
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            text-align: center;
        }

        .result-btn:active { transform: scale(0.96); }

        .btn-take {
            background: linear-gradient(135deg, #00FF85, #00CC66);
            color: #000;
        }

        .btn-sell {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #FFD700;
            color: #FFD700;
        }

        /* Коллекция */
        .collection-item {
            background: rgba(15, 15, 25, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 18px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(0,255,133,0.15);
        }

        .task-card {
            background: rgba(15, 15, 25, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 12px;
            border: 1px solid rgba(0,255,133,0.15);
        }

        .task-btn {
            background: linear-gradient(135deg, #00FF85, #00CC66);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            margin-top: 12px;
            cursor: pointer;
            color: #000;
        }

        .task-btn:active { transform: scale(0.96); }

        .profile-card {
            background: linear-gradient(135deg, rgba(0,255,133,0.1), rgba(255,0,255,0.1));
            border-radius: 40px;
            padding: 28px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid rgba(0,255,133,0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-card {
            background: rgba(15, 15, 25, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 14px;
            text-align: center;
            border: 1px solid rgba(0,255,133,0.15);
        }

        .sell-btn {
            background: none;
            border: 1px solid #FFD700;
            color: #FFD700;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
        }

        button { cursor: pointer; }
        
        .glitch-text {
            animation: glitch 3s infinite;
        }
        
        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 5px #00FF85; }
            95% { text-shadow: 0 0 5px #00FF85; }
            96% { text-shadow: -2px 0 #FF00FF, 2px 0 #00F0FF; }
            97% { text-shadow: 2px 0 #FF00FF, -2px 0 #00F0FF; }
            98% { text-shadow: 0 0 5px #00FF85; }
        }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="scan-line"></div>
    <div class="noise"></div>

    <div class="container">
        <div class="header">
            <div class="logo glitch-text">🔥 MEMCASE</div>
            <div class="balance-row">
                <div class="balance-item coins">🪙 <span id="coins">500</span></div>
                <div class="balance-item crystals">💎 <span id="crystals">10</span></div>
                <div class="balance-item stars">⭐ <span id="stars">0</span></div>
            </div>
        </div>

        <div id="cases-tab" class="tab-content active">
            <div class="cases-grid" id="cases-grid"></div>
        </div>

        <div id="collection-tab" class="tab-content">
            <h3 style="margin-bottom: 16px; color: #00FF85;">📦 КИБЕР-КОЛЛЕКЦИЯ <span id="collection-count">0</span></h3>
            <div id="collection-list"></div>
            <button id="sell-duplicates-btn" style="width:100%; margin-top:16px; background: linear-gradient(135deg, #FF00FF, #00FF85); border:none; padding:14px; border-radius:40px; font-weight:bold; color:#fff;">🔄 ПРОДАТЬ ВСЕ ДУБЛИКАТЫ</button>
        </div>

        <div id="games-tab" class="tab-content">
            <div class="task-card">
                <h3 style="color: #00FF85;">🖱️ НЕЙРО-ТАП</h3>
                <p style="font-size:14px; color:#aaa;">Нажимай на кнопку → +1 монета</p>
                <div style="text-align: center; margin: 20px 0;">
                    <button id="tap-btn" style="background: linear-gradient(135deg, #1C1C1E, #0A0A0A); border: 2px solid #00FF85; width: 150px; height: 150px; border-radius: 75px; font-size: 48px; cursor: pointer; box-shadow: 0 0 20px rgba(0,255,133,0.3);">🖱️</button>
                </div>
                <p>Осталось нажатий: <span id="clicks-left" style="color:#00FF85;">50</span> / 50</p>
                <div style="height:4px; background:#333; border-radius:2px; margin-top:8px;"><div id="clicks-progress" style="width:100%; height:100%; background:#00FF85; border-radius:2px;"></div></div>
            </div>
            <div class="task-card">
                <h3 style="color: #FF00FF;">⚡ БОНУСНЫЙ РЕЖИМ</h3>
                <p style="font-size:14px; color:#aaa;">200 нажатий за 60 сек → 1 кристалл</p>
                <button id="bonus-tap-btn" class="task-btn" style="width:100%; background: linear-gradient(135deg, #FF00FF, #CC00CC);">🎮 АКТИВИРОВАТЬ</button>
                <p id="bonus-timer" style="margin-top:8px; font-size:12px; color:#FF00FF;"></p>
            </div>
        </div>

        <div id="profile-tab" class="tab-content">
            <div class="profile-card">
                <div style="font-size:64px;">👤</div>
                <h3 id="user-name" style="color:#00FF85;">Игрок</h3>
                <p style="color:#aaa;" id="user-level">Уровень 1</p>
            </div>
            <div class="stats-grid">
                <div class="stat-card"><div style="font-size:24px;">🎁</div><div><strong id="opened-cases" style="font-size:20px;">0</strong></div><div style="font-size:11px;">открыто</div></div>
                <div class="stat-card"><div style="font-size:24px;">📦</div><div><strong id="unique-memes" style="font-size:20px;">0</strong></div><div style="font-size:11px;">уникальных</div></div>
                <div class="stat-card"><div style="font-size:24px;">👥</div><div><strong id="referral-count" style="font-size:20px;">0</strong></div><div style="font-size:11px;">друзей</div></div>
                <div class="stat-card"><div style="font-size:24px;">🏆</div><div><strong id="rank" style="font-size:20px;">Новичок</strong></div><div style="font-size:11px;">ранг</div></div>
            </div>
            <button id="buy-crystals-btn" class="task-btn" style="width:100%; margin-top:16px; background: linear-gradient(135deg, #00F0FF, #0088CC); color:#fff;">⭐ КУПИТЬ КРИСТАЛЛЫ</button>
            <button id="referral-btn" class="task-btn" style="width:100%; margin-top:12px; background: linear-gradient(135deg, #B942FF, #8B22CC);">👥 РЕФЕРАЛЬНАЯ ССЫЛКА</button>
        </div>

        <div class="nav">
            <button class="nav-btn active" data-tab="cases">🎁<span class="nav-label">КЕЙСЫ</span></button>
            <button class="nav-btn" data-tab="collection">📦<span class="nav-label">КОЛЛЕКЦИЯ</span></button>
            <button class="nav-btn" data-tab="games">🎮<span class="nav-label">ИГРЫ</span></button>
            <button class="nav-btn" data-tab="profile">👤<span class="nav-label">ПРОФИЛЬ</span></button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#050505');
        tg.setBackgroundColor('#050505');

        let user = tg.initDataUnsafe?.user || { first_name: 'Игрок', id: Math.floor(Math.random() * 1000000) };
        document.getElementById('user-name').innerText = user.first_name;

        let balance = { coins: 500, crystals: 10, stars: 0 };
        let collection = [];
        let openedCases = 0;
        let referralCount = 0;
        let referredBy = null;
        let lastFreeCase = null;
        let lastLuckyCase = null;
        let lastRiskyCase = null;
        let dailyBonusLast = null;
        let dailyBonusStreak = 0;
        let clicksToday = 0;
        let lastClickDate = null;
        let bonusAvailableAt = null;
        let bonusActive = false;

        const MEMES = [
            { title: "Черемша", rarity: "common", price: 15, preview: "https://media.tenor.com/5iWwZrXqWl0AAAAi/cat-meme.gif", link: "https://tiktok.com/@memes/1" },
            { title: "Ждун", rarity: "common", price: 12, preview: "https://media.tenor.com/3oR7wX7K5VkAAAAi/meme-funny.gif", link: "https://youtube.com/shorts/1" },
            { title: "Лойс", rarity: "common", price: 10, preview: "https://media.tenor.com/4sXxWrVqY7kAAAAi/funny-cat.gif", link: "https://tiktok.com/@memes/4" },
            { title: "TikTok Болливуд", rarity: "rare", price: 50, preview: "https://media.tenor.com/8qXwR7VvX9kAAAAi/bollywood.gif", link: "https://tiktok.com/@memes/2" },
            { title: "Подслушано", rarity: "rare", price: 65, preview: "https://media.tenor.com/6yWwZrXqWl0AAAAi/therapist.gif", link: "https://tiktok.com/@memes/3" },
            { title: "ВИРУС 2024", rarity: "legendary", price: 200, preview: "https://media.tenor.com/2pYqLvXq6YgAAAAi/viral.gif", link: "https://youtube.com/shorts/viral" },
            { title: "Мем года", rarity: "legendary", price: 250, preview: "https://media.tenor.com/1pXqLvWq7YgAAAAi/meme-year.gif", link: "https://youtube.com/shorts/meme" }
        ];

        const CASES = [
            { id: "free", name: "БЕСПЛАТНЫЙ", icon: "🎁", price: 0, priceType: "free", cooldown: 4 * 60 * 60, cooldownText: "4 часа", dropRates: { common: 85, rare: 15 }, limitDaily: 6, color: "#00FF85" },
            { id: "common", name: "ОБЫЧНЫЙ", icon: "📦", price: 50, priceType: "coins", cooldown: 0, dropRates: { common: 75, rare: 25 }, limitDaily: 999, color: "#00FF85" },
            { id: "rare", name: "РЕДКИЙ", icon: "💎", price: 5, priceType: "crystals", cooldown: 0, dropRates: { common: 40, rare: 50, epic: 10 }, limitDaily: 10, color: "#FF00FF" },
            { id: "epic", name: "ЭПИЧЕСКИЙ", icon: "⭐", price: 15, priceType: "crystals", cooldown: 0, dropRates: { rare: 60, epic: 35, legendary: 5 }, limitDaily: 5, color: "#FFD700" },
            { id: "lucky", name: "УДАЧНЫЙ", icon: "🍀", price: 200, priceType: "coins", cooldown: 60 * 60, cooldownText: "1 час", dropRates: { common: 25, rare: 25, epic: 25, legendary: 25 }, limitDaily: 3, color: "#00FF85" },
            { id: "thematic", name: "ТЕМАТИЧЕСКИЙ", icon: "🎭", price: 5, priceType: "crystals", cooldown: 0, dropRates: { common: 50, rare: 50 }, limitDaily: 3, color: "#FF00FF" },
            { id: "risky", name: "РИСКОВАННЫЙ", icon: "⚡", price: 50, priceType: "crystals", cooldown: 12 * 60 * 60, cooldownText: "12 часов", dropRates: { epic: 70, legendary: 25, secret: 5 }, limitDaily: 1, color: "#FFD700" },
            { id: "friend", name: "ДРУЖЕСКИЙ", icon: "🤝", price: 0, priceType: "friend", cooldown: 0, dropRates: { common: 50, rare: 50 }, limitDaily: 5, color: "#FF6B6B" }
        ];

        function saveData() {
            localStorage.setItem('memcase_cyber', JSON.stringify({ balance, collection, openedCases, lastFreeCase, lastLuckyCase, lastRiskyCase, dailyBonusLast, dailyBonusStreak, clicksToday, lastClickDate, bonusAvailableAt, referralCount, referredBy }));
        }

        function loadData() {
            const saved = localStorage.getItem('memcase_cyber');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    balance = data.balance || { coins: 500, crystals: 10, stars: 0 };
                    collection = data.collection || [];
                    openedCases = data.openedCases || 0;
                    lastFreeCase = data.lastFreeCase || null;
                    lastLuckyCase = data.lastLuckyCase || null;
                    lastRiskyCase = data.lastRiskyCase || null;
                    dailyBonusLast = data.dailyBonusLast || null;
                    dailyBonusStreak = data.dailyBonusStreak || 0;
                    clicksToday = data.clicksToday || 0;
                    lastClickDate = data.lastClickDate || null;
                    bonusAvailableAt = data.bonusAvailableAt || null;
                    referralCount = data.referralCount || 0;
                    referredBy = data.referredBy || null;
                } catch(e) {}
            }
            updateUI();
            renderCases();
            checkReferral();
        }

        function updateUI() {
            document.getElementById('coins').innerText = balance.coins;
            document.getElementById('crystals').innerText = balance.crystals;
            document.getElementById('stars').innerText = balance.stars;
            document.getElementById('opened-cases').innerText = openedCases;
            document.getElementById('referral-count').innerText = referralCount;
            
            let uniqueCount = new Set(collection.map(m => m.title)).size;
            document.getElementById('unique-memes').innerText = uniqueCount;
            document.getElementById('collection-count').innerText = collection.length;
            
            let level = Math.floor(uniqueCount / 5) + 1;
            document.getElementById('user-level').innerText = `Уровень ${level}`;
            
            let ranks = ['Новичок', 'Мемер', 'Рофлан', 'Кринж-лорд', 'Мем-король'];
            document.getElementById('rank').innerText = ranks[Math.min(Math.floor(uniqueCount / 10), 4)];
            
            const today = new Date().toDateString();
            if (lastClickDate !== today) {
                clicksToday = 0;
                lastClickDate = today;
                saveData();
            }
            let clicksLeft = 50 - clicksToday;
            document.getElementById('clicks-left').innerText = Math.max(0, clicksLeft);
            document.getElementById('clicks-progress').style.width = `${((50 - Math.max(0, clicksLeft)) / 50) * 100}%`;
            
            renderCollection();
        }

        function renderCases() {
            const container = document.getElementById('cases-grid');
            if (!container) return;
            
            container.innerHTML = CASES.map(c => {
                let priceText = '';
                if (c.priceType === 'free') priceText = `Бесплатно / ${c.cooldownText}`;
                else if (c.priceType === 'coins') priceText = `${c.price} монет`;
                else if (c.priceType === 'crystals') priceText = `${c.price} кристаллов`;
                else if (c.priceType === 'friend') priceText = 'За друга';
                
                let cooldownHtml = '';
                if (c.id === 'free' && lastFreeCase) {
                    let diff = c.cooldown - (Date.now() - lastFreeCase) / 1000;
                    if (diff > 0) {
                        let hours = Math.floor(diff / 3600);
                        let minutes = Math.floor((diff % 3600) / 60);
                        cooldownHtml = `<div class="case-cooldown">⏰ ${hours}ч ${minutes}м</div>`;
                    } else {
                        cooldownHtml = `<div class="case-cooldown">✅ Доступно</div>`;
                    }
                } else if (c.id === 'lucky' && lastLuckyCase) {
                    let diff = c.cooldown - (Date.now() - lastLuckyCase) / 1000;
                    if (diff > 0) {
                        let minutes = Math.floor(diff / 60);
                        cooldownHtml = `<div class="case-cooldown">⏰ ${minutes}м</div>`;
                    } else {
                        cooldownHtml = `<div class="case-cooldown">✅ Доступно</div>`;
                    }
                } else if (c.id === 'risky' && lastRiskyCase) {
                    let diff = c.cooldown - (Date.now() - lastRiskyCase) / 1000;
                    if (diff > 0) {
                        let hours = Math.floor(diff / 3600);
                        cooldownHtml = `<div class="case-cooldown">⏰ ${hours}ч</div>`;
                    } else {
                        cooldownHtml = `<div class="case-cooldown">✅ Доступно</div>`;
                    }
                } else if (c.cooldown > 0) {
                    cooldownHtml = `<div class="case-cooldown">⏰ ${c.cooldownText}</div>`;
                }
                
                return `<div class="case-card ${c.id}" data-case="${c.id}" style="border-top-color: ${c.color};"><div class="case-icon">${c.icon}</div><div class="case-title">${c.name}</div><div class="case-price" style="color:${c.color};">${priceText}</div>${cooldownHtml}</div>`;
            }).join('');
            
            document.querySelectorAll('.case-card').forEach(card => {
                card.onclick = () => openCase(card.dataset.case);
            });
        }

        function renderCollection() {
            const container = document.getElementById('collection-list');
            if (!container) return;
            
            if (collection.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#666; padding:40px;">🎁 Нет мемов<br>Открой кейс!</div>';
                return;
            }
            
            let counts = {};
            collection.forEach(m => counts[m.title] = (counts[m.title] || 0) + 1);
            
            let unique = [];
            let seen = new Set();
            for (let m of collection) {
                if (!seen.has(m.title)) {
                    seen.add(m.title);
                    unique.push(m);
                }
            }
            
            container.innerHTML = unique.map(meme => `
                <div class="collection-item">
                    <img src="${meme.preview}" style="width:48px;height:48px;border-radius:12px;object-fit:cover;">
                    <div style="flex:1">
                        <div style="font-weight:500">${meme.title}</div>
                        <div style="font-size:11px; color:${meme.rarity === 'common' ? '#00FF85' : (meme.rarity === 'rare' ? '#FF00FF' : '#FFD700')}">${meme.rarity} | 💰 ${meme.price}</div>
                    </div>
                    ${counts[meme.title] > 1 ? `<span style="color:#FFD700;">×${counts[meme.title]}</span>` : ''}
                    <button class="sell-btn" data-title="${meme.title}">Продать</button>
                </div>
            `).join('');
            
            document.querySelectorAll('.sell-btn').forEach(btn => {
                btn.onclick = () => sellMeme(btn.dataset.title);
            });
        }

        function sellMeme(title) {
            let idx = collection.findIndex(m => m.title === title);
            if (idx !== -1) {
                let meme = collection[idx];
                balance.coins += meme.price;
                collection.splice(idx, 1);
                saveData();
                updateUI();
                tg.showAlert(`💰 Продано за ${meme.price} монет!`);
                tg.HapticFeedback.notificationOccurred('success');
            }
        }

        function sellAllDuplicates() {
            let counts = {};
            collection.forEach(m => counts[m.title] = (counts[m.title] || 0) + 1);
            
            let newCollection = [];
            let soldCount = 0;
            let soldValue = 0;
            
            for (let title in counts) {
                let keepCount = 1;
                let duplicates = counts[title] - keepCount;
                if (duplicates > 0) {
                    let meme = collection.find(m => m.title === title);
                    soldCount += duplicates;
                    soldValue += duplicates * meme.price;
                    for (let i = 0; i < keepCount; i++) newCollection.push(meme);
                } else {
                    for (let i = 0; i < counts[title]; i++) newCollection.push(collection.find(m => m.title === title));
                }
            }
            
            if (soldCount > 0) {
                collection = newCollection;
                balance.coins += soldValue;
                saveData();
                updateUI();
                tg.showAlert(`🔄 Продано ${soldCount} дубликатов! +${soldValue} монет`);
            } else {
                tg.showAlert('Нет дубликатов для продажи');
            }
        }

        function showFullscreenResult(meme, onClose) {
            let rarityColor = meme.rarity === 'common' ? '#00FF85' : (meme.rarity === 'rare' ? '#FF00FF' : '#FFD700');
            
            let resultDiv = document.createElement('div');
            resultDiv.className = 'fullscreen-result';
            resultDiv.innerHTML = `
                <div class="result-card" style="border-color: ${rarityColor};">
                    <img src="${meme.preview}" class="result-image" style="box-shadow: 0 0 40px ${rarityColor};">
                    <div class="result-title" style="color: ${rarityColor};">${meme.title}</div>
                    <div class="result-rarity" style="background: ${rarityColor}20; color: ${rarityColor};">${meme.rarity}</div>
                    <div class="result-price">💰 Стоимость: ${meme.price} монет</div>
                    <div class="result-buttons">
                        <button class="result-btn btn-take">📥 ЗАБРАТЬ</button>
                        <button class="result-btn btn-sell">💸 ПРОДАТЬ (${Math.floor(meme.price / 2)})</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(resultDiv);
            
            // Кнопка ЗАБРАТЬ - просто закрываем
            resultDiv.querySelector('.btn-take').onclick = () => {
                resultDiv.remove();
                if (onClose) onClose(false);
            };
            
            // Кнопка ПРОДАТЬ - продаем и закрываем
            resultDiv.querySelector('.btn-sell').onclick = () => {
                let sellPrice = Math.floor(meme.price / 2);
                balance.coins += sellPrice;
                saveData();
                updateUI();
                tg.showAlert(`💰 Продано за ${sellPrice} монет!`);
                tg.HapticFeedback.notificationOccurred('success');
                resultDiv.remove();
                if (onClose) onClose(true);
            };
        }

        async function openCase(caseId) {
            const caseData = CASES.find(c => c.id === caseId);
            if (!caseData) return;
            
            let storageKey = `case_${caseId}_today`;
            let todayOpened = parseInt(localStorage.getItem(storageKey) || '0');
            if (todayOpened >= caseData.limitDaily) {
                tg.showAlert(`❌ Лимит ${caseData.limitDaily} кейсов в день исчерпан!`);
                return;
            }
            
            if (caseData.priceType === 'coins' && balance.coins < caseData.price) {
                tg.showAlert('❌ Не хватает монет!');
                return;
            }
            if (caseData.priceType === 'crystals' && balance.crystals < caseData.price) {
                tg.showAlert('❌ Не хватает кристаллов!');
                return;
            }
            
            if (caseId === 'free' && lastFreeCase && Date.now() - lastFreeCase < caseData.cooldown * 1000) {
                let remaining = Math.ceil((caseData.cooldown * 1000 - (Date.now() - lastFreeCase)) / 3600000);
                tg.showAlert(`⏰ Доступно через ${remaining} часа`);
                return;
            }
            if (caseId === 'lucky' && lastLuckyCase && Date.now() - lastLuckyCase < caseData.cooldown * 1000) {
                let remaining = Math.ceil((caseData.cooldown * 1000 - (Date.now() - lastLuckyCase)) / 60000);
                tg.showAlert(`⏰ Доступно через ${remaining} минут`);
                return;
            }
            if (caseId === 'risky' && lastRiskyCase && Date.now() - lastRiskyCase < caseData.cooldown * 1000) {
                let remaining = Math.ceil((caseData.cooldown * 1000 - (Date.now() - lastRiskyCase)) / 3600000);
                tg.showAlert(`⏰ Доступно через ${remaining} часа`);
                return;
            }
            
            if (caseData.priceType === 'friend') {
                navigator.clipboard.writeText(`https://t.me/memcasek_bot?start=ref_${user.id}`);
                tg.showAlert('👥 Ссылка скопирована! Друг получит бонус');
                return;
            }
            
            if (caseData.priceType === 'coins') balance.coins -= caseData.price;
            if (caseData.priceType === 'crystals') balance.crystals -= caseData.price;
            
            if (caseId === 'free') lastFreeCase = Date.now();
            if (caseId === 'lucky') lastLuckyCase = Date.now();
            if (caseId === 'risky') lastRiskyCase = Date.now();
            
            localStorage.setItem(storageKey, todayOpened + 1);
            
            tg.HapticFeedback.impactOccurred('heavy');
            
            let card = document.querySelector(`.case-card[data-case="${caseId}"]`);
            if (card) {
                card.classList.add('shake', 'flash');
                setTimeout(() => card.classList.remove('shake', 'flash'), 400);
            }
            
            let modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `<div class="modal-content"><div style="font-size:60px;">🎲</div><h3 style="color:#00FF85;">ВСКРЫТИЕ...</h3><div class="loading-bar"><div class="loading-progress"></div></div></div>`;
            document.body.appendChild(modal);
            setTimeout(() => { let prog = modal.querySelector('.loading-progress'); if(prog) prog.style.width = '100%'; }, 100);
            
            setTimeout(() => {
                let roll = Math.random() * 100;
                let rarity = '';
                let cumulative = 0;
                for (let [r, chance] of Object.entries(caseData.dropRates)) {
                    cumulative += chance;
                    if (roll <= cumulative) { rarity = r; break; }
                }
                
                let possibleMemes = MEMES.filter(m => m.rarity === rarity);
                if (possibleMemes.length === 0) possibleMemes = MEMES;
                
                let meme = possibleMemes[Math.floor(Math.random() * possibleMemes.length)];
                collection.push({...meme});
                openedCases++;
                balance.coins += 10;
                
                saveData();
                updateUI();
                modal.remove();
                
                if (meme.rarity !== 'common') {
                    canvasConfetti({ particleCount: 200, spread: 80, origin: { y: 0.6 }, colors: ['#00FF85', '#FF00FF', '#00F0FF'] });
                }
                
                showFullscreenResult(meme, (sold) => {
                    if (!sold) {
                        updateUI();
                    }
                });
            }, 1000);
        }

        function dailyBonus() {
            const today = new Date().toDateString();
            if (dailyBonusLast === today) {
                tg.showAlert('Бонус уже получен сегодня!');
                return;
            }
            dailyBonusLast = today;
            dailyBonusStreak = (dailyBonusStreak + 1) % 7;
            let bonusCoins = 50;
            let bonusCrystals = 1;
            if (dailyBonusStreak === 0) {
                bonusCoins = 100;
                bonusCrystals = 3;
                tg.showAlert('🎉 7 дней подряд! +100 монет, +3 кристалла!');
            } else {
                tg.showAlert(`🎁 Ежедневный бонус! +${bonusCoins} монет, +1 кристалл`);
            }
            balance.coins += bonusCoins;
            balance.crystals += bonusCrystals;
            saveData();
            updateUI();
        }

        function tapClick() {
            let clicksLeft = 50 - clicksToday;
            if (clicksLeft <= 0) {
                tg.showAlert('❌ Лимит нажатий на сегодня исчерпан!');
                return;
            }
            clicksToday++;
            balance.coins++;
            saveData();
            updateUI();
            tg.HapticFeedback.impactOccurred('light');
        }

        function startBonusTap() {
            if (bonusActive) return;
            if (bonusAvailableAt && Date.now() < bonusAvailableAt) {
                let remaining = Math.ceil((bonusAvailableAt - Date.now()) / 3600000);
                tg.showAlert(`⏰ Бонусный режим доступен через ${remaining} часа`);
                return;
            }
            bonusActive = true;
            let clicks = 0;
            let timeLeft = 60;
            let timerInterval;
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content" style="width:300px;">
                    <div style="font-size:48px;">⚡</div>
                    <h3 style="color:#FF00FF;">БОНУСНЫЙ РЕЖИМ</h3>
                    <p style="margin:10px 0;">Нажми 200 раз за 60 секунд</p>
                    <div style="font-size:48px; margin:10px 0;"><span id="bonus-clicks" style="color:#00FF85;">0</span>/200</div>
                    <div id="bonus-time" style="font-size:32px; color:#FF00FF;">60</div>
                    <button id="bonus-tap" style="background:linear-gradient(135deg,#1C1C1E,#0A0A0A); border:2px solid #FF00FF; width:200px; padding:20px; border-radius:60px; font-size:32px; margin:10px 0; cursor:pointer; box-shadow:0 0 20px rgba(255,0,255,0.3);">🖱️</button>
                    <button id="bonus-cancel" style="background:none; border:none; color:#666; cursor:pointer;">Отмена</button>
                </div>
            `;
            document.body.appendChild(modal);
            
            document.getElementById('bonus-tap').onclick = () => {
                clicks++;
                document.getElementById('bonus-clicks').innerText = clicks;
                tg.HapticFeedback.impactOccurred('light');
                if (clicks >= 200) {
                    clearInterval(timerInterval);
                    modal.remove();
                    bonusActive = false;
                    balance.crystals++;
                    saveData();
                    updateUI();
                    tg.showAlert('🎉 Бонусный режим пройден! +1 кристалл');
                    bonusAvailableAt = Date.now() + 6 * 60 * 60 * 1000;
                    saveData();
                }
            };
            
            document.getElementById('bonus-cancel').onclick = () => {
                clearInterval(timerInterval);
                modal.remove();
                bonusActive = false;
            };
            
            timerInterval = setInterval(() => {
                timeLeft--;
                let timeSpan = document.getElementById('bonus-time');
                if (timeSpan) timeSpan.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    modal.remove();
                    bonusActive = false;
                    if (clicks < 200) tg.showAlert('❌ Не успел! Попробуй через 6 часов');
                    bonusAvailableAt = Date.now() + 6 * 60 * 60 * 1000;
                    saveData();
                }
            }, 1000);
        }

        function buyCrystals() {
            let starsAmount = prompt('⭐ Введите количество Stars для покупки (от 5 до 1000):', '5');
            if (!starsAmount) return;
            starsAmount = parseInt(starsAmount);
            if (starsAmount < 5 || starsAmount > 1000) {
                tg.showAlert('❌ Введите число от 5 до 1000');
                return;
            }
            let crystalsGained = starsAmount;
            let bonus = 0;
            if (starsAmount >= 10) bonus = 1;
            if (starsAmount >= 25) bonus = 5;
            if (starsAmount >= 50) bonus = 15;
            if (starsAmount >= 100) bonus = 50;
            if (starsAmount >= 250) bonus = 150;
            if (starsAmount >= 500) bonus = 350;
            if (starsAmount >= 1000) bonus = 800;
            crystalsGained += bonus;
            balance.crystals += crystalsGained;
            balance.stars += starsAmount;
            saveData();
            updateUI();
            tg.showAlert(`⭐ Куплено ${crystalsGained} кристаллов! Бонус: +${bonus}`);
            tg.HapticFeedback.notificationOccurred('success');
        }

        function showReferralLink() {
            let refLink = `https://t.me/memcasek_bot?start=ref_${user.id}`;
            navigator.clipboard.writeText(refLink);
            tg.showAlert('📎 Реферальная ссылка скопирована!');
        }

        function checkReferral() {
            let urlParams = new URLSearchParams(window.location.search);
            let refId = urlParams.get('start');
            if (refId && refId.startsWith('ref_') && !referredBy) {
                let referrerId = parseInt(refId.split('_')[1]);
                if (referrerId !== user.id) {
                    referredBy = referrerId;
                    balance.crystals += 2;
                    balance.coins += 100;
                    referralCount++;
                    saveData();
                    updateUI();
                    tg.showAlert('🎉 Вы перешли по реферальной ссылке! +2 кристалла, +100 монет');
                }
            }
        }

        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                document.getElementById(btn.dataset.tab + '-tab').classList.add('active');
            };
        });

        document.getElementById('sell-duplicates-btn').onclick = sellAllDuplicates;
        document.getElementById('tap-btn').onclick = tapClick;
        document.getElementById('bonus-tap-btn').onclick = startBonusTap;
        document.getElementById('buy-crystals-btn').onclick = buyCrystals;
        document.getElementById('referral-btn').onclick = showReferralLink;
        
        loadData();
        dailyBonus();
    </script>
</body>
</html>
