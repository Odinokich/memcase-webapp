<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, shrink-to-fit=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MemCase</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            /* ОТКЛЮЧАЕМ ЗУМ */
            touch-action: manipulation;
        }
        
        body {
            background: #0A0A0A;
            font-family: -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            color: #FFFFFF;
            overflow-x: hidden;
            /* Запрещаем зум на body */
            touch-action: pan-y pan-x;
        }
        
        /* Запрещаем зум на всех кнопках и интерактивных элементах */
        button, .case-card, .sell-btn, .task-btn, .crystal-btn, .tap-button {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Стили для MemeTap кнопки - фикс зума */
        .tap-button {
            background: #1C1C1E;
            border: 0.5px solid #3A3A3C;
            width: 150px;
            height: 150px;
            border-radius: 75px;
            font-size: 48px;
            cursor: pointer;
            /* Отключаем выделение и зум */
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        
        .tap-button:active {
            transform: scale(0.96);
        }
        
        /* Остальные стили */
        .container { max-width: 500px; margin: 0 auto; padding-bottom: 70px; }
        .header { padding: 20px; border-bottom: 0.5px solid rgba(255,255,255,0.1); position: sticky; top: 0; background: #0A0A0A; z-index: 10; }
        .logo { font-size: 24px; font-weight: 600; margin-bottom: 12px; }
        .balance-row { display: flex; gap: 16px; flex-wrap: wrap; }
        .balance-item { background: #1C1C1E; padding: 6px 14px; border-radius: 30px; font-size: 14px; font-weight: 500; }
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: #0A0A0A; border-top: 0.5px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; padding: 10px 0 14px; z-index: 10; }
        .nav-btn { background: none; border: none; color: #8E8E93; font-size: 22px; cursor: pointer; text-align: center; padding: 4px 16px; border-radius: 30px; touch-action: manipulation; }
        .nav-btn.active { color: #FFFFFF; background: #1C1C1E; }
        .nav-label { font-size: 10px; display: block; margin-top: 4px; }
        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }
        .cases-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .case-card { background: #1C1C1E; border-radius: 16px; padding: 16px 8px; text-align: center; cursor: pointer; transition: all 0.1s ease; border: 0.5px solid rgba(255,255,255,0.05); touch-action: manipulation; }
        .case-card:active { transform: scale(0.97); }
        .case-icon { font-size: 32px; margin-bottom: 8px; }
        .case-title { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
        .case-price { font-size: 11px; color: #8E8E93; }
        .case-cooldown { font-size: 10px; color: #8E8E93; margin-top: 6px; }
        @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        @keyframes flash { 0%,100% { opacity: 1; } 50% { opacity: 0.5; background: rgba(255,255,255,0.1); } }
        .shake { animation: shake 0.2s ease; }
        .flash { animation: flash 0.15s ease; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: #1C1C1E; border-radius: 32px; padding: 32px; text-align: center; min-width: 240px; }
        .loading-bar { width: 180px; height: 2px; background: #3A3A3C; border-radius: 2px; margin-top: 20px; overflow: hidden; }
        .loading-progress { width: 0%; height: 100%; background: #FFFFFF; transition: width 1s ease; }
        .meme-card { background: #1C1C1E; border-radius: 24px; padding: 24px; text-align: center; margin: 20px 0; }
        .meme-image { width: 160px; height: 160px; border-radius: 20px; object-fit: cover; margin-bottom: 16px; }
        .rarity-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; margin: 8px 0; }
        .collection-item { background: #1C1C1E; border-radius: 14px; padding: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
        .sell-btn { background: none; border: 0.5px solid #3A3A3C; color: #FFD700; padding: 6px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; touch-action: manipulation; }
        .task-card { background: #1C1C1E; border-radius: 16px; padding: 16px; margin-bottom: 12px; }
        .task-btn { background: none; border: 0.5px solid #3A3A3C; padding: 8px 20px; border-radius: 30px; margin-top: 10px; font-size: 13px; color: #FFFFFF; cursor: pointer; touch-action: manipulation; }
        .profile-card { background: #1C1C1E; border-radius: 24px; padding: 24px; text-align: center; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-card { background: #1C1C1E; border-radius: 16px; padding: 12px; text-align: center; }
        .crystal-btn { background: #007AFF; border: none; padding: 12px; border-radius: 30px; font-weight: 600; width: 100%; margin-top: 16px; cursor: pointer; color: white; touch-action: manipulation; }
        .disabled-btn { opacity: 0.5; pointer-events: none; }
        .referral-link { background: #1C1C1E; padding: 8px; border-radius: 12px; font-size: 12px; word-break: break-all; margin-top: 8px; }
    </style>
    <script>
        // Дополнительный запрет зума через JS
        document.addEventListener('touchmove', function(e) {
            if (e.scale && e.scale !== 1) {
                e.preventDefault();
            }
        }, { passive: false });
        
        document.addEventListener('gesturestart', function(e) {
            e.preventDefault();
        });
    </script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🎴 MEMCASE</div>
            <div class="balance-row">
                <div class="balance-item">🪙 <span id="coins">100</span></div>
                <div class="balance-item">💎 <span id="crystals">3</span></div>
                <div class="balance-item">⭐ <span id="stars">0</span></div>
            </div>
        </div>

        <div id="cases-tab" class="tab-content active">
            <div class="cases-grid" id="cases-grid"></div>
            <div id="result"></div>
        </div>

        <div id="collection-tab" class="tab-content">
            <h3 style="margin-bottom: 16px;">📦 КОЛЛЕКЦИЯ <span id="collection-count">0</span></h3>
            <div id="collection-list"></div>
            <button id="sell-duplicates-btn" style="width:100%; margin-top:16px; background:#1C1C1E; border:0.5px solid #3A3A3C; padding:12px; border-radius:30px; cursor:pointer; touch-action:manipulation;">🔄 Продать все дубликаты</button>
        </div>

        <div id="games-tab" class="tab-content">
            <div class="task-card">
                <h3>🖱️ Мемотап</h3>
                <p style="font-size:14px; color:#8E8E93;">Нажимай на кнопку → +1 монета</p>
                <div style="text-align: center; margin: 20px 0;">
                    <button id="tap-btn" class="tap-button" style="touch-action: manipulation;">🖱️</button>
                </div>
                <p>Осталось нажатий: <span id="clicks-left">50</span> / 50</p>
                <div style="height:4px; background:#3A3A3C; border-radius:2px; margin-top:8px;"><div id="clicks-progress" style="width:100%; height:100%; background:#FFFFFF; border-radius:2px;"></div></div>
            </div>
            <div class="task-card">
                <h3>⚡ Бонусный режим</h3>
                <p style="font-size:14px; color:#8E8E93;">200 нажатий за 60 сек → 1 кристалл</p>
                <button id="bonus-tap-btn" class="task-btn" style="width:100%; touch-action: manipulation;">🎮 Начать</button>
                <p id="bonus-timer" style="margin-top:8px; font-size:12px;"></p>
            </div>
        </div>

        <div id="profile-tab" class="tab-content">
            <div class="profile-card">
                <div style="font-size:48px;">👤</div>
                <h3 id="user-name">Игрок</h3>
                <p style="color:#8E8E93; font-size:14px;" id="user-level">Уровень 1</p>
            </div>
            <div class="stats-grid">
                <div class="stat-card"><div>🎁</div><div><strong id="opened-cases">0</strong></div><div>открыто</div></div>
                <div class="stat-card"><div>📦</div><div><strong id="unique-memes">0</strong></div><div>уникальных</div></div>
                <div class="stat-card"><div>👥</div><div><strong id="referral-count">0</strong></div><div>друзей</div></div>
                <div class="stat-card"><div>🏆</div><div><strong id="rank">Новичок</strong></div><div>ранг</div></div>
            </div>
            <button id="buy-crystals-btn" class="crystal-btn" style="touch-action: manipulation;">⭐ Купить кристаллы</button>
            <button id="referral-btn" class="task-btn" style="width:100%; margin-top:12px; touch-action: manipulation;">👥 Реферальная ссылка</button>
            <div id="referral-link-container" class="referral-link" style="display:none;"></div>
        </div>

        <div class="nav">
            <button class="nav-btn active" data-tab="cases" style="touch-action: manipulation;">🏠<span class="nav-label">Кейсы</span></button>
            <button class="nav-btn" data-tab="collection" style="touch-action: manipulation;">📦<span class="nav-label">Коллекция</span></button>
            <button class="nav-btn" data-tab="games" style="touch-action: manipulation;">🎮<span class="nav-label">Игры</span></button>
            <button class="nav-btn" data-tab="profile" style="touch-action: manipulation;">👤<span class="nav-label">Профиль</span></button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#0A0A0A');
        tg.setBackgroundColor('#0A0A0A');
        // Отключаем вертикальную прокрутку страницы при тапе на кнопку
        tg.disableVerticalSwipes?.();

        let user = tg.initDataUnsafe?.user || { first_name: 'Игрок', id: Math.floor(Math.random() * 1000000) };
        document.getElementById('user-name').innerText = user.first_name;

        // Данные
        let balance = { coins: 100, crystals: 3, stars: 0 };
        let collection = [];
        let openedCases = 0;
        let referralCount = 0;
        let referredBy = null;
        let lastFreeCase = null;
        let lastLuckyCase = null;
        let lastRiskyCase = null;
        let dailyTasks = { open3: false, sell5: false, tap50: false };
        let dailyBonusLast = null;
        let dailyBonusStreak = 0;
        let clicksToday = 0;
        let lastClickDate = null;
        let bonusAvailableAt = null;
        let bonusActive = false;
        let achievements = [];

        // 20 мемов
        const MEMES = [
            { title: "Черемша", rarity: "common", price: 10, preview: "https://media.tenor.com/5iWwZrXqWl0AAAAi/cat-meme.gif", link: "https://tiktok.com/@memes/1", category: "animals" },
            { title: "Ждун", rarity: "common", price: 10, preview: "https://media.tenor.com/3oR7wX7K5VkAAAAi/meme-funny.gif", link: "https://youtube.com/shorts/1", category: "classic" },
            { title: "Лойс", rarity: "common", price: 10, preview: "https://media.tenor.com/4sXxWrVqY7kAAAAi/funny-cat.gif", link: "https://tiktok.com/@memes/4", category: "classic" },
            { title: "Грустный кот", rarity: "common", price: 10, preview: "https://media.tenor.com/5iWwZrXqWl0AAAAi/cat-meme.gif", link: "https://tiktok.com/@memes/5", category: "animals" },
            { title: "Кряк", rarity: "common", price: 10, preview: "https://media.tenor.com/3oR7wX7K5VkAAAAi/meme-funny.gif", link: "https://tiktok.com/@memes/6", category: "animals" },
            { title: "Собака-радость", rarity: "common", price: 10, preview: "https://media.tenor.com/4sXxWrVqY7kAAAAi/funny-cat.gif", link: "https://tiktok.com/@memes/7", category: "animals" },
            { title: "TikTok Болливуд", rarity: "rare", price: 40, preview: "https://media.tenor.com/8qXwR7VvX9kAAAAi/bollywood.gif", link: "https://tiktok.com/@memes/2", category: "tiktok" },
            { title: "Подслушано", rarity: "rare", price: 40, preview: "https://media.tenor.com/6yWwZrXqWl0AAAAi/therapist.gif", link: "https://tiktok.com/@memes/3", category: "classic" },
            { title: "Сигма бой", rarity: "rare", price: 40, preview: "https://media.tenor.com/8qXwR7VvX9kAAAAi/bollywood.gif", link: "https://tiktok.com/@memes/8", category: "tiktok" },
            { title: "Мем с усами", rarity: "rare", price: 40, preview: "https://media.tenor.com/6yWwZrXqWl0AAAAi/therapist.gif", link: "https://tiktok.com/@memes/9", category: "classic" },
            { title: "Бобр курва", rarity: "epic", price: 150, preview: "https://media.tenor.com/1pXqLvWq7YgAAAAi/meme-year.gif", link: "https://youtube.com/shorts/2", category: "animals" },
            { title: "Скайп с котом", rarity: "epic", price: 150, preview: "https://media.tenor.com/2pYqLvXq6YgAAAAi/viral.gif", link: "https://youtube.com/shorts/3", category: "classic" },
            { title: "Танцующий дед", rarity: "epic", price: 150, preview: "https://media.tenor.com/1pXqLvWq7YgAAAAi/meme-year.gif", link: "https://youtube.com/shorts/4", category: "tiktok" },
            { title: "Гитлер плачет", rarity: "epic", price: 150, preview: "https://media.tenor.com/2pYqLvXq6YgAAAAi/viral.gif", link: "https://youtube.com/shorts/5", category: "classic" },
            { title: "Вирус 2024", rarity: "legendary", price: 500, preview: "https://media.tenor.com/2pYqLvXq6YgAAAAi/viral.gif", link: "https://youtube.com/shorts/viral", category: "viral" },
            { title: "Мем года", rarity: "legendary", price: 500, preview: "https://media.tenor.com/1pXqLvWq7YgAAAAi/meme-year.gif", link: "https://youtube.com/shorts/meme", category: "classic" },
            { title: "Секретный мем #1", rarity: "secret", price: 1000, preview: "https://media.tenor.com/2pYqLvXq6YgAAAAi/viral.gif", link: "https://youtube.com/shorts/secret1", category: "secret" },
            { title: "Секретный мем #2", rarity: "secret", price: 1000, preview: "https://media.tenor.com/1pXqLvWq7YgAAAAi/meme-year.gif", link: "https://youtube.com/shorts/secret2", category: "secret" }
        ];

        // 8 типов кейсов
        const CASES = [
            { id: "free", name: "📦 Бесплатный", icon: "🎁", price: 0, priceType: "free", cooldown: 4 * 60 * 60, cooldownText: "4 часа", dropRates: { common: 85, rare: 15 }, limitDaily: 6 },
            { id: "common", name: "🪙 Обычный", icon: "📦", price: 50, priceType: "coins", cooldown: 0, dropRates: { common: 75, rare: 25 }, limitDaily: 999 },
            { id: "rare", name: "🔥 Редкий", icon: "💎", price: 5, priceType: "crystals", cooldown: 0, dropRates: { common: 40, rare: 50, epic: 10 }, limitDaily: 10 },
            { id: "epic", name: "👑 Эпический", icon: "⭐", price: 15, priceType: "crystals", cooldown: 0, dropRates: { rare: 60, epic: 35, legendary: 5 }, limitDaily: 5 },
            { id: "lucky", name: "🎰 Удачный", icon: "🍀", price: 200, priceType: "coins", cooldown: 60 * 60, cooldownText: "1 час", dropRates: { common: 25, rare: 25, epic: 25, legendary: 25 }, limitDaily: 3 },
            { id: "thematic", name: "📚 Тематический", icon: "🎭", price: 5, priceType: "crystals", cooldown: 0, dropRates: { common: 50, rare: 50 }, limitDaily: 3 },
            { id: "risky", name: "🎲 Рискованный", icon: "⚡", price: 50, priceType: "crystals", cooldown: 12 * 60 * 60, cooldownText: "12 часов", dropRates: { epic: 70, legendary: 25, secret: 5 }, limitDaily: 1 },
            { id: "friend", name: "👥 Дружеский", icon: "🤝", price: 0, priceType: "friend", cooldown: 0, dropRates: { common: 50, rare: 50 }, limitDaily: 5 }
        ];

        function saveData() {
            localStorage.setItem('memcase_v2', JSON.stringify({ balance, collection, openedCases, lastFreeCase, lastLuckyCase, lastRiskyCase, dailyTasks, dailyBonusLast, dailyBonusStreak, clicksToday, lastClickDate, bonusAvailableAt, referralCount, achievements, referredBy }));
        }

        function loadData() {
            const saved = localStorage.getItem('memcase_v2');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    balance = data.balance || { coins: 100, crystals: 3, stars: 0 };
                    collection = data.collection || [];
                    openedCases = data.openedCases || 0;
                    lastFreeCase = data.lastFreeCase || null;
                    lastLuckyCase = data.lastLuckyCase || null;
                    lastRiskyCase = data.lastRiskyCase || null;
                    dailyTasks = data.dailyTasks || { open3: false, sell5: false, tap50: false };
                    dailyBonusLast = data.dailyBonusLast || null;
                    dailyBonusStreak = data.dailyBonusStreak || 0;
                    clicksToday = data.clicksToday || 0;
                    lastClickDate = data.lastClickDate || null;
                    bonusAvailableAt = data.bonusAvailableAt || null;
                    referralCount = data.referralCount || 0;
                    achievements = data.achievements || [];
                    referredBy = data.referredBy || null;
                } catch(e) {}
            }
            updateUI();
            renderCases();
            checkReferral();
        }

        function updateUI() {
            document.getElementById('coins').innerText = balance.coins;
            document.getElementById('crystals').innerText = balance.crystals;
            document.getElementById('stars').innerText = balance.stars;
            document.getElementById('opened-cases').innerText = openedCases;
            document.getElementById('referral-count').innerText = referralCount;
            
            let uniqueCount = new Set(collection.map(m => m.title)).size;
            document.getElementById('unique-memes').innerText = uniqueCount;
            document.getElementById('collection-count').innerText = collection.length;
            
            let level = Math.floor(uniqueCount / 5) + 1;
            document.getElementById('user-level').innerText = `Уровень ${level}`;
            
            let ranks = ['Новичок', 'Мемер', 'Рофлан', 'Кринж-лорд', 'Мем-король'];
            document.getElementById('rank').innerText = ranks[Math.min(Math.floor(uniqueCount / 10), 4)];
            
            const today = new Date().toDateString();
            if (lastClickDate !== today) {
                clicksToday = 0;
                lastClickDate = today;
                saveData();
            }
            let clicksLeft = 50 - clicksToday;
            document.getElementById('clicks-left').innerText = Math.max(0, clicksLeft);
            document.getElementById('clicks-progress').style.width = `${((50 - Math.max(0, clicksLeft)) / 50) * 100}%`;
            
            renderCollection();
            checkDailyTasks();
            checkAchievements(uniqueCount);
        }

        function renderCases() {
            const container = document.getElementById('cases-grid');
            if (!container) return;
            
            container.innerHTML = CASES.map(c => {
                let priceText = '';
                if (c.priceType === 'free') priceText = `Бесплатно / ${c.cooldownText}`;
                else if (c.priceType === 'coins') priceText = `${c.price} монет`;
                else if (c.priceType === 'crystals') priceText = `${c.price} кристаллов`;
                else if (c.priceType === 'friend') priceText = 'За друга';
                
                let cooldownHtml = '';
                if (c.id === 'free' && lastFreeCase) {
                    let diff = c.cooldown - (Date.now() - lastFreeCase) / 1000;
                    if (diff > 0) {
                        let hours = Math.floor(diff / 3600);
                        let minutes = Math.floor((diff % 3600) / 60);
                        cooldownHtml = `<div class="case-cooldown">⏰ ${hours}ч ${minutes}м</div>`;
                    } else {
                        cooldownHtml = `<div class="case-cooldown">✅ Доступно</div>`;
                    }
                } else if (c.id === 'lucky' && lastLuckyCase) {
                    let diff = c.cooldown - (Date.now() - lastLuckyCase) / 1000;
                    if (diff > 0) {
                        let minutes = Math.floor(diff / 60);
                        cooldownHtml = `<div class="case-cooldown">⏰ ${minutes}м</div>`;
                    } else {
                        cooldownHtml = `<div class="case-cooldown">✅ Доступно</div>`;
                    }
                } else if (c.id === 'risky' && lastRiskyCase) {
                    let diff = c.cooldown - (Date.now() - lastRiskyCase) / 1000;
                    if (diff > 0) {
                        let hours = Math.floor(diff / 3600);
                        cooldownHtml = `<div class="case-cooldown">⏰ ${hours}ч</div>`;
                    } else {
                        cooldownHtml = `<div class="case-cooldown">✅ Доступно</div>`;
                    }
                } else if (c.cooldown > 0) {
                    cooldownHtml = `<div class="case-cooldown">⏰ ${c.cooldownText}</div>`;
                }
                
                return `
                    <div class="case-card" data-case="${c.id}">
                        <div class="case-icon">${c.icon}</div>
                        <div class="case-title">${c.name}</div>
                        <div class="case-price">${priceText}</div>
                        ${cooldownHtml}
                    </div>
                `;
            }).join('');
            
            document.querySelectorAll('.case-card').forEach(card => {
                card.onclick = () => openCase(card.dataset.case);
            });
        }

        function renderCollection() {
            const container = document.getElementById('collection-list');
            if (!container) return;
            
            if (collection.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#8E8E93; padding:40px;">🎁 Нет мемов<br>Открой кейс!</div>';
                return;
            }
            
            let counts = {};
            collection.forEach(m => counts[m.title] = (counts[m.title] || 0) + 1);
            
            let unique = [];
            let seen = new Set();
            for (let m of collection) {
                if (!seen.has(m.title)) {
                    seen.add(m.title);
                    unique.push(m);
                }
            }
            
            container.innerHTML = unique.map(meme => `
                <div class="collection-item">
                    <img src="${meme.preview}" style="width:48px;height:48px;border-radius:12px;object-fit:cover;">
                    <div style="flex:1">
                        <div style="font-weight:500">${meme.title}</div>
                        <div style="font-size:11px; color:#8E8E93;">${meme.rarity} | 💰 ${meme.price}</div>
                    </div>
                    ${counts[meme.title] > 1 ? `<span style="color:#FFD700;">×${counts[meme.title]}</span>` : ''}
                    <button class="sell-btn" data-title="${meme.title}">Продать</button>
                </div>
            `).join('');
            
            document.querySelectorAll('.sell-btn').forEach(btn => {
                btn.onclick = () => sellMeme(btn.dataset.title);
            });
        }

        function sellMeme(title) {
            let idx = collection.findIndex(m => m.title === title);
            if (idx !== -1) {
                let meme = collection[idx];
                balance.coins += meme.price;
                collection.splice(idx, 1);
                saveData();
                updateUI();
                tg.showAlert(`💰 Продано за ${meme.price} монет!`);
                tg.HapticFeedback.notificationOccurred('success');
                checkDailyTasks();
            }
        }

        function sellAllDuplicates() {
            let counts = {};
            collection.forEach(m => counts[m.title] = (counts[m.title] || 0) + 1);
            
            let newCollection = [];
            let soldCount = 0;
            let soldValue = 0;
            
            for (let title in counts) {
                let keepCount = 1;
                let duplicates = counts[title] - keepCount;
                if (duplicates > 0) {
                    let meme = collection.find(m => m.title === title);
                    soldCount += duplicates;
                    soldValue += duplicates * meme.price;
                    for (let i = 0; i < keepCount; i++) {
                        newCollection.push(meme);
                    }
                } else {
                    for (let i = 0; i < counts[title]; i++) {
                        newCollection.push(collection.find(m => m.title === title));
                    }
                }
            }
            
            if (soldCount > 0) {
                collection = newCollection;
                balance.coins += soldValue;
                saveData();
                updateUI();
                tg.showAlert(`🔄 Продано ${soldCount} дубликатов! +${soldValue} монет`);
                checkDailyTasks();
            } else {
                tg.showAlert('Нет дубликатов для продажи');
            }
        }

        async function openCase(caseId) {
            const caseData = CASES.find(c => c.id === caseId);
            if (!caseData) return;
            
            let storageKey = `case_${caseId}_today`;
            let todayOpened = parseInt(localStorage.getItem(storageKey) || '0');
            if (todayOpened >= caseData.limitDaily) {
                tg.showAlert(`❌ Лимит ${caseData.limitDaily} кейсов в день исчерпан!`);
                return;
            }
            
            if (caseData.priceType === 'coins' && balance.coins < caseData.price) {
                tg.showAlert('❌ Не хватает монет!');
                return;
            }
            if (caseData.priceType === 'crystals' && balance.crystals < caseData.price) {
                tg.showAlert('❌ Не хватает кристаллов!');
                return;
            }
            
            if (caseId === 'free' && lastFreeCase && Date.now() - lastFreeCase < caseData.cooldown * 1000) {
                let remaining = Math.ceil((caseData.cooldown * 1000 - (Date.now() - lastFreeCase)) / 3600000);
                tg.showAlert(`⏰ Доступно через ${remaining} часа`);
                return;
            }
            if (caseId === 'lucky' && lastLuckyCase && Date.now() - lastLuckyCase < caseData.cooldown * 1000) {
                let remaining = Math.ceil((caseData.cooldown * 1000 - (Date.now() - lastLuckyCase)) / 60000);
                tg.showAlert(`⏰ Доступно через ${remaining} минут`);
                return;
            }
            if (caseId === 'risky' && lastRiskyCase && Date.now() - lastRiskyCase < caseData.cooldown * 1000) {
                let remaining = Math.ceil((caseData.cooldown * 1000 - (Date.now() - lastRiskyCase)) / 3600000);
                tg.showAlert(`⏰ Доступно через ${remaining} часа`);
                return;
            }
            
            if (caseData.priceType === 'friend') {
                let refLink = `https://t.me/memcasek_bot?start=ref_${user.id}`;
                navigator.clipboard.writeText(refLink);
                tg.showAlert('👥 Ссылка скопирована! Друг получит бонус за регистрацию');
                return;
            }
            
            if (caseData.priceType === 'coins') balance.coins -= caseData.price;
            if (caseData.priceType === 'crystals') balance.crystals -= caseData.price;
            
            if (caseId === 'free') lastFreeCase = Date.now();
            if (caseId === 'lucky') lastLuckyCase = Date.now();
            if (caseId === 'risky') lastRiskyCase = Date.now();
            
            localStorage.setItem(storageKey, todayOpened + 1);
            
            tg.HapticFeedback.impactOccurred('heavy');
            
            let card = document.querySelector(`.case-card[data-case="${caseId}"]`);
            if (card) {
                card.classList.add('shake', 'flash');
                setTimeout(() => card.classList.remove('shake', 'flash'), 300);
            }
            
            let modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `<div class="modal-content"><div style="font-size:48px;">🎲</div><h3>Вскрытие...</h3><div class="loading-bar"><div class="loading-progress"></div></div></div>`;
            document.body.appendChild(modal);
            setTimeout(() => { let prog = modal.querySelector('.loading-progress'); if(prog) prog.style.width = '100%'; }, 100);
            
            setTimeout(() => {
                let roll = Math.random() * 100;
                let rarity = '';
                let cumulative = 0;
                for (let [r, chance] of Object.entries(caseData.dropRates)) {
                    cumulative += chance;
                    if (roll <= cumulative) { rarity = r; break; }
                }
                
                let possibleMemes = MEMES.filter(m => m.rarity === rarity);
                if (caseData.id === 'thematic') {
                    let themes = ['animals', 'classic', 'tiktok', 'viral'];
                    let theme = themes[Math.floor(Math.random() * themes.length)];
                    possibleMemes = MEMES.filter(m => m.category === theme);
                    if (possibleMemes.length === 0) possibleMemes = MEMES.filter(m => m.rarity === rarity);
                }
                if (possibleMemes.length === 0) possibleMemes = MEMES;
                
                let meme = possibleMemes[Math.floor(Math.random() * possibleMemes.length)];
                collection.push({...meme});
                openedCases++;
                balance.coins += 10;
                
                saveData();
                updateUI();
                modal.remove();
                
                let rarityColor = meme.rarity === 'common' ? '#FFFFFF' : (meme.rarity === 'rare' ? '#E0E0E0' : (meme.rarity === 'epic' ? '#FFD700' : '#FFFFFF'));
                let resultDiv = document.getElementById('result');
                if (resultDiv) {
                    resultDiv.innerHTML = `
                        <div class="meme-card" style="animation: fadeIn 0.3s ease;">
                            <img src="${meme.preview}" class="meme-image">
                            <h3>${meme.title}</h3>
                            <div class="rarity-badge" style="background:${meme.rarity === 'legendary' ? 'rgba(255,215,0,0.2)' : '#1C1C1E'}; border:0.5px solid ${rarityColor};">${meme.rarity}</div>
                            <p style="margin:8px 0">💰 ${meme.price} монет</p>
                            <a href="${meme.link}" target="_blank" style="display:inline-block; background:#1C1C1E; border:0.5px solid #3A3A3C; padding:10px 24px; border-radius:30px; text-decoration:none; color:#FFF;">🎬 Смотреть</a>
                            <div><button onclick="document.getElementById('result').innerHTML = ''" style="margin-top:16px; background:none; border:none; color:#8E8E93;">Закрыть</button></div>
                        </div>
                    `;
                }
                
                if (meme.rarity === 'legendary') {
                    canvasConfetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
                }
                
                checkDailyTasks();
            }, 1000);
        }

        function checkDailyTasks() {
            let uniqueCount = new Set(collection.map(m => m.title)).size;
            if (openedCases >= 3 && !dailyTasks.open3) {
                dailyTasks.open3 = true;
                balance.coins += 50;
                balance.crystals += 1;
                tg.showAlert('📅 Задание: открыть 3 кейса! +50 монет, +1 кристалл');
                saveData();
                updateUI();
            }
            if (uniqueCount >= 10 && !dailyTasks.collect10) {
                dailyTasks.collect10 = true;
                balance.crystals += 2;
                tg.showAlert('🏆 Достижение: 10 уникальных мемов! +2 кристалла');
                saveData();
                updateUI();
            }
        }

        function checkAchievements(uniqueCount) {
            if (openedCases >= 100 && !achievements.includes('opener')) {
                achievements.push('opener');
                balance.crystals += 3;
                tg.showAlert('🏆 Достижение: Открывашка! +3 кристалла');
                saveData();
                updateUI();
            }
            if (uniqueCount >= 25 && !achievements.includes('collector25')) {
                achievements.push('collector25');
                balance.crystals += 5;
                tg.showAlert('🏆 Достижение: Коллекционер 25! +5 кристаллов');
                saveData();
                updateUI();
            }
        }

        function dailyBonus() {
            const today = new Date().toDateString();
            if (dailyBonusLast === today) {
                tg.showAlert('Бонус уже получен сегодня!');
                return;
            }
            dailyBonusLast = today;
            dailyBonusStreak = (dailyBonusStreak + 1) % 7;
            let bonusCoins = 50;
            let bonusCrystals = 1;
            if (dailyBonusStreak === 0) {
                bonusCoins = 100;
                bonusCrystals = 3;
                tg.showAlert('🎉 7 дней подряд! +100 монет, +3 кристалла!');
            } else {
                tg.showAlert(`🎁 Ежедневный бонус! +${bonusCoins} монет, +1 кристалл`);
            }
            balance.coins += bonusCoins;
            balance.crystals += bonusCrystals;
            saveData();
            updateUI();
        }

        function tapClick(e) {
            // Предотвращаем всплытие и стандартное поведение (зум)
            if (e) {
                e.preventDefault();
                e.stopPropagation();
            }
            
            let clicksLeft = 50 - clicksToday;
            if (clicksLeft <= 0) {
                tg.showAlert('❌ Лимит нажатий на сегодня исчерпан!');
                return;
            }
            clicksToday++;
            balance.coins++;
            saveData();
            updateUI();
            tg.HapticFeedback.impactOccurred('light');
            // Возвращаем false для предотвращения зума
            return false;
        }

        function startBonusTap() {
            if (bonusActive) return;
            if (bonusAvailableAt && Date.now() < bonusAvailableAt) {
                let remaining = Math.ceil((bonusAvailableAt - Date.now()) / 3600000);
                tg.showAlert(`⏰ Бонусный режим доступен через ${remaining} часа`);
                return;
            }
            bonusActive = true;
            let clicks = 0;
            let timeLeft = 60;
            let timerInterval;
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content" style="width:280px;">
                    <div style="font-size:36px;">⚡</div>
                    <h3>Бонусный режим</h3>
                    <p>Нажми 200 раз за 60 секунд</p>
                    <div style="font-size:48px; margin:10px 0;"><span id="bonus-clicks">0</span>/200</div>
                    <div id="bonus-time" style="font-size:24px;">60</div>
                    <button id="bonus-tap" style="background:#1C1C1E; border:0.5px solid #3A3A3C; width:200px; padding:20px; border-radius:60px; font-size:32px; margin:10px 0; cursor:pointer; touch-action: manipulation;">🖱️</button>
                    <button id="bonus-cancel" style="background:none; border:none; color:#8E8E93; cursor:pointer;">Отмена</button>
                </div>
            `;
            document.body.appendChild(modal);
            
            document.getElementById('bonus-tap').onclick = (e) => {
                e.preventDefault();
                e.stopPropagation();
                clicks++;
                document.getElementById('bonus-clicks').innerText = clicks;
                tg.HapticFeedback.impactOccurred('light');
                if (clicks >= 200) {
                    clearInterval(timerInterval);
                    modal.remove();
                    bonusActive = false;
                    balance.crystals++;
                    saveData();
                    updateUI();
                    tg.showAlert('🎉 Бонусный режим пройден! +1 кристалл');
                    bonusAvailableAt = Date.now() + 6 * 60 * 60 * 1000;
                    saveData();
                }
                return false;
            };
            
            document.getElementById('bonus-cancel').onclick = () => {
                clearInterval(timerInterval);
                modal.remove();
                bonusActive = false;
            };
            
            timerInterval = setInterval(() => {
                timeLeft--;
                let timeSpan = document.getElementById('bonus-time');
                if (timeSpan) timeSpan.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    modal.remove();
                    bonusActive = false;
                    if (clicks < 200) tg.showAlert('❌ Не успел! Попробуй через 6 часов');
                    bonusAvailableAt = Date.now() + 6 * 60 * 60 * 1000;
                    saveData();
                }
            }, 1000);
        }

        function buyCrystals() {
            let starsAmount = prompt('⭐ Введите количество Stars для покупки (от 5 до 1000):', '5');
            if (!starsAmount) return;
            starsAmount = parseInt(starsAmount);
            if (starsAmount < 5 || starsAmount > 1000) {
                tg.showAlert('❌ Введите число от 5 до 1000');
                return;
            }
            let crystalsGained = starsAmount;
            let bonus = 0;
            if (starsAmount >= 10) bonus = 1;
            if (starsAmount >= 25) bonus = 5;
            if (starsAmount >= 50) bonus = 15;
            if (starsAmount >= 100) bonus = 50;
            if (starsAmount >= 250) bonus = 150;
            if (starsAmount >= 500) bonus = 350;
            if (starsAmount >= 1000) bonus = 800;
            crystalsGained += bonus;
            balance.crystals += crystalsGained;
            balance.stars += starsAmount;
            saveData();
            updateUI();
            tg.showAlert(`⭐ Куплено ${crystalsGained} кристаллов! Бонус: +${bonus}`);
            tg.HapticFeedback.notificationOccurred('success');
        }

        function showReferralLink() {
            let refLink = `https://t.me/memcasek_bot?start=ref_${user.id}`;
            let container = document.getElementById('referral-link-container');
            if (container) {
                container.innerHTML = `🔗 Ваша ссылка:<br><span style="font-size:11px;">${refLink}</span><br><button id="copy-ref-link" style="margin-top:8px; background:#1C1C1E; border:0.5px solid #3A3A3C; padding:6px 12px; border-radius:20px;">Копировать</button>`;
                container.style.display = 'block';
                document.getElementById('copy-ref-link')?.addEventListener('click', () => {
                    navigator.clipboard.writeText(refLink);
                    tg.showAlert('📎 Ссылка скопирована!');
                });
            } else {
                navigator.clipboard.writeText(refLink);
                tg.showAlert('📎 Ссылка скопирована!');
            }
        }

        function checkReferral() {
            let urlParams = new URLSearchParams(window.location.hash.split('?')[1]);
            let refId = urlParams.get('start');
            if (refId && refId.startsWith('ref_') && !referredBy) {
                let referrerId = parseInt(refId.split('_')[1]);
                if (referrerId !== user.id) {
                    referredBy = referrerId;
                    balance.crystals += 2;
                    balance.coins += 100;
                    referralCount++;
                    saveData();
                    updateUI();
                    tg.showAlert('🎉 Вы перешли по реферальной ссылке! +2 кристалла, +100 монет');
                }
            }
        }

        // Инициализация навигации
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                let tabId = btn.dataset.tab + '-tab';
                let tab = document.getElementById(tabId);
                if (tab) tab.classList.add('active');
            };
        });
        
        document.getElementById('sell-duplicates-btn').onclick = sellAllDuplicates;
        
        // Обработчик для тап-кнопки с защитой от зума
        let tapBtn = document.getElementById('tap-btn');
        if (tapBtn) {
            tapBtn.addEventListener('click', tapClick);
            tapBtn.addEventListener('touchstart', function(e) {
                // Предотвращаем зум при касании
                if (e.touches.length > 1) {
                    e.preventDefault();
                }
            });
        }
        
        document.getElementById('bonus-tap-btn').onclick = startBonusTap;
        document.getElementById('buy-crystals-btn').onclick = buyCrystals;
        document.getElementById('referral-btn').onclick = showReferralLink;
        
        loadData();
        dailyBonus();
    </script>
</body>
</html>
